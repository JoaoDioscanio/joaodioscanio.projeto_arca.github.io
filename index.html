<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Arca</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./images/dog.png">
</head>

<body>

    <main class="container">
        <section class="login-card">
            <div class="login-content">
                <div class="login-header">
                    <h2>Faça o seu login</h2>
                </div>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com">

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">

                <div class="login-actions">
                    <a href="#" class="forgot-link">Esqueceu sua senha?</a>
                </div>

                <button onclick="login()">Confirmar</button>

                <p class="signup">Ainda não tenho uma conta</p>
                <p id="mensagem" class="message"></p>
            </div>

            <div class="login-visual">
                <img src="./images/Gemini_Generated_Image_bm6if4bm6if4bm6i.png" class="login-image" alt="">
            </div>

        </section>
    </main>

    <script src="script.js"></script>

</body>

</html>
